<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>IalClaw v3.0 - Memória Cognitiva</title>
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    body {
      background-color: #121212;
      background-image: radial-gradient(#2a2a2a 1px, transparent 1px);
      background-size: 20px 20px;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      overflow: hidden;
    }

    h1 {
      padding: 15px 20px;
      margin: 0;
      text-align: center;
      background: rgba(18, 18, 18, 0.85);
      backdrop-filter: blur(5px);
      border-bottom: 1px solid #2a2a2a;
      font-weight: 400;
      letter-spacing: 2px;
      color: #00ccff;
      text-shadow: 0 0 10px rgba(0, 204, 255, 0.3);
      position: relative;
      z-index: 10;
    }

    #mynetwork {
      width: 100vw;
      height: calc(100vh - 65px);
      position: absolute;
      top: 65px;
      left: 0;
    }

    /* Glassmorphism Chat Container */
    #chat-container {
      position: absolute;
      right: 30px;
      bottom: 30px;
      width: 380px;
      height: 550px;
      background: rgba(25, 25, 30, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      z-index: 1000;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .chat-bubble {
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 85%;
      line-height: 1.5;
      word-break: break-word;
      font-size: 0.95em;
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bubble-user {
      background: linear-gradient(135deg, #00ccff, #0088ff);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
      box-shadow: 0 4px 10px rgba(0, 136, 255, 0.3);
    }

    .bubble-bot {
      background: rgba(60, 60, 65, 0.8);
      color: #e0e0e0;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    #typing-indicator {
      display: none;
      font-size: 0.85em;
      color: #888;
      padding: 0 15px 10px 15px;
      font-style: italic;
    }
  </style>
</head>

<body>
  <h1>IalClaw Cognitive Graph</h1>
  <div id="mynetwork"></div>
  
  <div id="chat-container">
    <div style="padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: 600; text-align: center; color: #fff; background: rgba(0,0,0,0.2);">
      <span style="color: #00ccff;">●</span> IalClaw Agent
    </div>
    <div id="chat-messages"></div>
    <div id="typing-indicator">IalClaw está pensando...</div>
    <div style="padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; background: rgba(0,0,0,0.2);">
      <input type="text" id="chat-input" placeholder="Digite sua mensagem e aperte Enter..."
        style="flex: 1; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 8px; outline: none; font-size: 0.95em; transition: border-color 0.2s;">
    </div>
  </div>

  <script type="text/javascript">
    const chatInput = document.getElementById('chat-input');
    const chatMsgs = document.getElementById('chat-messages');
    const typingIndicator = document.getElementById('typing-indicator');

    // Focus and highlight
    chatInput.addEventListener('focus', () => chatInput.style.borderColor = '#00ccff');
    chatInput.addEventListener('blur', () => chatInput.style.borderColor = 'rgba(255,255,255,0.2)');

    function appendMessage(role, text) {
      const el = document.createElement('div');
      el.classList.add('chat-bubble');
      el.classList.add(role === 'user' ? 'bubble-user' : 'bubble-bot');
      
      el.innerText = text;
      chatMsgs.appendChild(el);
      chatMsgs.scrollTop = chatMsgs.scrollHeight;
    }

    appendMessage('bot', '🧠 Olá! Eu sou o IalClaw, seu Agente Cognitivo. Para que eu crie o seu Núcleo Principal de Identidade na nossa memória, qual o seu nome e como gostaria de ser chamado?');

    chatInput.addEventListener('keypress', async (e) => {
      if (e.key === 'Enter' && chatInput.value.trim() && !chatInput.disabled) {
        const text = chatInput.value.trim();
        chatInput.value = '';
        chatInput.disabled = true;
        appendMessage('user', text);
        typingIndicator.style.display = 'block';
        chatMsgs.scrollTop = chatMsgs.scrollHeight;

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
          });
          const data = await res.json();
          
          typingIndicator.style.display = 'none';
            if (data.answer) {
              appendMessage('bot', data.answer);
              loadGraph();
          } else if (data.error) {
            appendMessage('bot', 'Erro: ' + data.error);
            }
        } catch (err) {
          typingIndicator.style.display = 'none';
          appendMessage('bot', 'Erro de rede ao falar com IalClaw.');
        } finally {
          chatInput.disabled = false;
          chatInput.focus();
        }
      }
    });

    // Variáveis globais para o Grafo utilizando DataSet
    const nodesData = new vis.DataSet([]);
    const edgesData = new vis.DataSet([]);
    let network = null;

    function initGraph() {
      const container = document.getElementById('mynetwork');
      const data = { nodes: nodesData, edges: edgesData };
      const options = {
        nodes: {
          shape: 'dot',
          size: 20,
          font: { color: '#ffffff', face: 'Segoe UI', size: 14 },
          borderWidth: 2,
          color: { 
            border: '#333', 
            background: '#00ccff', 
            highlight: { border: '#fff', background: '#ff0099' } 
          },
          shadow: { enabled: true, color: 'rgba(0,204,255,0.4)', size: 10, x: 0, y: 0 }
        },
        edges: {
          width: 1.5,
          color: { color: 'rgba(255,255,255,0.2)', highlight: '#00ccff' },
          font: { color: '#aaaaaa', align: 'middle', size: 11, face: 'Segoe UI' },
          arrows: { to: { enabled: true, scaleFactor: 0.5 } },
          smooth: { type: 'continuous' }
        },
        physics: {
          barnesHut: { gravitationalConstant: -3000, centralGravity: 0.1, springLength: 200 },
          stabilization: { iterations: 150 }
        },
        interaction: { hover: true, tooltipDelay: 200 }
      };
      network = new vis.Network(container, data, options);
    }

    function loadGraph() {
      fetch('/api/graph')
        .then(res => res.json())
        .then(data => {
          // Criamos um ID único para cada aresta para o Vis.js conseguir atualizar corretamente
          const processEdges = data.edges.map(e => ({
            ...e,
            id: `${e.from}-${e.to}-${e.label}`
          }));

          // O método update() magicamente mescla as diferenças, adiciona novos e evita recriar o canvas!
          nodesData.update(data.nodes);
          edgesData.update(processEdges);
        })
        .catch(console.error);
    }
    
    // Inicializar e carregar primeiro estado
    initGraph();
    loadGraph();
    
    // Refresh a cada 10 segundos
    setInterval(loadGraph, 10000);
  </script>
</body>

</html>
