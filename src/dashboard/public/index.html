<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>IalClaw v3.0 - Memória Cognitiva</title>
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    :root {
      --font-xs: 0.75rem;   /* 12px */
      --font-sm: 0.875rem;  /* 14px */
      --font-md: 1rem;      /* 16px */
      --font-lg: 1.125rem;  /* 18px */
      --font-xl: 1.25rem;   /* 20px */
      --font-family: 'Google Sans', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --font-mono: 'JetBrains Mono', Consolas, 'Courier New', monospace;

      /* Material Light Theme (Base) */
      --bg-base: #f8f9fa;
      --bg-surface: #ffffff;
      --bg-header: #ffffff;
      --bg-input: #f1f3f4;
      --text-main: #202124;
      --text-muted: #5f6368;
      --border-color: #dadce0;
      --accent: #1a73e8;
      --accent-hover: #174ea6;
      --shadow-sm: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
      
      /* Component Colors */
      --chat-user-bg: #e8f0fe;
      --chat-user-text: #1967d2;
      --chat-bot-bg: #f1f3f4;
      --chat-bot-text: #202124;
      --log-text: #137333;
      --thought-bg: #f8f9fa;
      --thought-border: #dadce0;
      --t-obs: #0d652d;
      --t-action: #b06000;
      --t-thought: #681da8;
      --t-rag: #c5221f;
      --t-final: #1a73e8;
      --stat-ok: #1e8e3e;
      --stat-warn: #f29900;
    }

    [data-theme="dark"] {
      /* Material Dark Theme */
      --bg-base: #202124;
      --bg-surface: #292a2d;
      --bg-header: #292a2d;
      --bg-input: #303134;
      --text-main: #e8eaed;
      --text-muted: #9aa0a6;
      --border-color: #3c4043;
      --accent: #8ab4f8;
      --accent-hover: #aecbfa;
      --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.3), 0 1px 3px 1px rgba(0,0,0,0.15);
      
      /* Component Colors */
      --chat-user-bg: #4285f4;
      --chat-user-text: #ffffff;
      --chat-bot-bg: #3c4043;
      --chat-bot-text: #e8eaed;
      --log-text: #81c995;
      --thought-bg: #202124;
      --thought-border: #5f6368;
      --t-obs: #81c995;
      --t-action: #fde293;
      --t-thought: #d7aefb;
      --t-rag: #f28b82;
      --t-final: #8ab4f8;
      --stat-ok: #81c995;
      --stat-warn: #fde293;
    }

    html { font-size: 16px; transition: font-size 0.2s ease-out; }

    body {
      background-color: var(--bg-base);
      color: var(--text-main);
      font-family: var(--font-family);
      margin: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: background-color 0.3s, color 0.3s;
    }

    /* Top Status Bar */
    #status-bar {
      height: 48px;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 24px;
      font-size: var(--font-sm);
      font-weight: 500;
      color: var(--text-muted);
      gap: 20px;
      z-index: 100;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      transition: background-color 0.3s, border-color 0.3s;
    }
    .stat-badge { color: var(--accent); font-weight: bold; }
    .stat-ok { color: var(--stat-ok); }
    .stat-warn { color: var(--stat-warn); }

    /* Zoom Controls */
    .zoom-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      padding: 4px 10px;
      font-size: var(--font-xs);
      font-weight: 600;
      transition: all 0.2s;
    }
    .zoom-btn:hover { background: var(--bg-input); color: var(--text-main); }
    .btn-primary { background: var(--accent); color: #fff; border: none; }
    .btn-primary:hover { background: var(--accent-hover); color: #fff; }

    /* Main Workspace */
    #workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
      padding: 16px;
      gap: 16px;
    }

    /* Panels Base - Google Material Card Style */
    .panel {
      background: var(--bg-surface);
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: all 0.3s;
    }

    /* Left Column: Graph + Debug */
    #left-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #mynetwork-container {
      flex: 1;
      background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    #mynetwork {
      width: 100%; height: 100%;
    }

    /* System Debug / Gateway Panel */
    #debug-panel {
      height: 250px;
    }
    .panel-header {
      background: var(--bg-surface);
      padding: 12px 16px;
      font-size: var(--font-sm);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #debug-log {
      flex: 1;
      padding: 12px 16px;
      overflow-y: auto;
      min-height: 0; /* 🔥 Flexbox Magic - Evita estourar o container pai */
      font-family: var(--font-mono);
      font-size: var(--font-sm);
      color: var(--log-text);
      line-height: 1.5;
      margin: 0;
      white-space: pre-wrap;
    }

    /* Right Column: Agent Panel */
    #right-col {
      width: 420px;
    }

    /* Thought Trace Panel */
    #thought-panel {
      height: 40%;
      border-bottom: 1px solid var(--border-color);
    }
    #thought-log {
      flex: 1;
      overflow-y: auto;
      min-height: 0; /* 🔥 Flexbox Magic */
      padding: 12px;
      font-family: var(--font-mono);
      font-size: var(--font-sm);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .thought-item { padding: 8px 12px; border-radius: 6px; background: var(--thought-bg); border-left: 4px solid var(--thought-border); color: var(--text-main); }
    .t-thought { border-color: var(--t-thought); }
    .t-action { border-color: var(--t-action); }
    .t-obs { border-color: var(--t-obs); }
    .t-final { border-color: var(--t-final); font-weight: bold; }
    .t-rag { border-color: var(--t-rag); }

    /* Chat Container */
    #chat-container {
      flex: 1;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      min-height: 0; /* 🔥 Flexbox Magic */
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    .chat-bubble {
      padding: 12px 18px;
      border-radius: 16px;
      max-width: 85%;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap; /* Garante que os '\n' do LLM sejam respeitados */
      font-size: var(--font-md);
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bubble-meta {
      font-size: var(--font-xs);
      opacity: 0.8;
      margin-bottom: 6px;
      display: block;
      font-weight: 500;
    }

    .bubble-user {
      background: var(--chat-user-bg);
      color: var(--chat-user-text);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble-bot {
      background: var(--chat-bot-bg);
      color: var(--chat-bot-text);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border-color);
    }

    #typing-indicator {
      display: none;
      font-size: var(--font-sm);
      color: var(--text-muted);
      padding: 0 16px 12px;
      font-style: italic;
    }

    /* Input Container */
    .input-area {
      padding: 16px;
      background: var(--bg-surface);
      border-top: 1px solid var(--border-color);
    }
    #chat-input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 18px;
      background: var(--bg-input);
      border: 1px solid transparent;
      color: var(--text-main);
      border-radius: 24px;
      outline: none;
      font-size: var(--font-md);
      font-family: inherit;
      transition: all 0.2s;
    }
    #chat-input:focus {
      border: 1px solid var(--accent);
      background: var(--bg-surface);
      box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
    }
  </style>
</head>

<body>
  <!-- Top Status Bar -->
  <header id="status-bar">
    <div>IalClaw V3.0 <span class="stat-badge">COGNITIVE DASHBOARD</span></div>
    <div>|</div>
    <div>Gateway: <span class="stat-ok">ONLINE</span></div>
    <div>Engine: <span class="stat-warn">STANDBY</span></div>
    
    <div style="margin-left: auto; display: flex; gap: 8px; align-items: center;">
      <span style="color: #666; font-size: var(--font-xs);">ZOOM</span>
      <button class="zoom-btn" onclick="changeZoom(-0.1)">-</button>
      <span id="zoom-level" style="color: #aaa; width: 45px; text-align: center; font-size: var(--font-xs);">100%</span>
      <button class="zoom-btn" onclick="changeZoom(0.1)">+</button>
      <button class="zoom-btn" id="theme-toggle-btn" onclick="toggleTheme()" style="margin-left: 8px;">🌓 Theme</button>
    </div>
    <div>|</div>
    <div>Nodes: <span id="stat-nodes" class="stat-badge">0</span></div>
    <div>Edges: <span id="stat-edges" class="stat-badge">0</span></div>
  </header>

  <div id="workspace">
    <!-- Left: Graph & Debug -->
    <div id="left-col">
      <div class="panel" id="mynetwork-container">
        <div id="mynetwork"></div>
      </div>
      <div class="panel" id="debug-panel">
        <div class="panel-header"><span>⚙️ Gateway & Policy Debug</span> <span>[LIVE]</span></div>
        <pre id="debug-log">// Aguardando interceptação de rotas e decisões do Gateway...</pre>
      </div>
    </div>

    <!-- Right: Agent Panel -->
    <div class="panel" id="right-col">
      <div id="thought-panel" style="display:flex; flex-direction:column;">
        <div class="panel-header">
          <span>🧠 Thought Trace (ReAct)</span>
          <button class="zoom-btn btn-primary" onclick="promptReplay()">▶ REPLAY</button>
        </div>
        <div id="thought-log">
          <div class="thought-item t-obs">[SYSTEM] AgentLoop Listening...</div>
        </div>
      </div>

      <div id="chat-container" style="display:flex; flex-direction:column;">
        <div class="panel-header"><span>💬 Interaction Panel</span></div>
        <div id="chat-messages"></div>
        <div id="typing-indicator">Agent is thinking...</div>
        <div class="input-area">
          <input type="text" id="chat-input" placeholder="Comando cognitivo..." autocomplete="off">
        </div>
      </div>
    </div>
  </div>

  <script type="text/javascript">
    const chatInput = document.getElementById('chat-input');
    const chatMsgs = document.getElementById('chat-messages');
    const typingIndicator = document.getElementById('typing-indicator');
    const thoughtLog = document.getElementById('thought-log');
    const debugLog = document.getElementById('debug-log');

    // --- Controle de Zoom Persistente ---
    let currentZoom = parseFloat(localStorage.getItem('ialclaw_zoom')) || 1.0;
    
    function applyZoom() {
      // Alterar a base no HTML escala todos os tamanhos (rem) automaticamente
      document.documentElement.style.fontSize = `${16 * currentZoom}px`;
      document.getElementById('zoom-level').innerText = `${Math.round(currentZoom * 100)}%`;
      localStorage.setItem('ialclaw_zoom', currentZoom);
    }

    function changeZoom(delta) {
      currentZoom = Math.max(0.5, Math.min(2.0, currentZoom + delta));
      applyZoom();
    }
    
    applyZoom(); // Inicializa na primeira carga

    // --- Controle de Temas (Google Clean UI) ---
    let currentTheme = localStorage.getItem('ialclaw_theme') || 'dark';
    
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('theme-toggle-btn').innerText = theme === 'light' ? '🌙 Escuro' : '☀️ Claro';
      if (network) network.setOptions(getGraphOptions()); // Atualiza cores do canvas na troca
    }

    function toggleTheme() {
      currentTheme = currentTheme === 'light' ? 'dark' : 'light';
      localStorage.setItem('ialclaw_theme', currentTheme);
      applyTheme(currentTheme);
    }
    
    applyTheme(currentTheme); // Inicializa Tema

    // --- Replay Cognitivo ---
    async function promptReplay() {
      const traceId = prompt("Cole o ID do Trace (trace_id) para reproduzir o raciocínio:");
      if (!traceId) return;
      
      try {
        thoughtLog.innerHTML = '';
        debugLog.innerText = `// Carregando replay para o trace: ${traceId}...\n`;
        chatMsgs.innerHTML = '';

        const res = await fetch(`/api/trace/${traceId}`);
        if (!res.ok) throw new Error("Trace não encontrado no banco de dados.");
        const events = await res.json();

        for (const e of events) {
          const data = JSON.parse(e.payload);
          
          if (e.type === 'gateway') {
            updateDebugLog(data);
          } else if (e.type === 'thought') {
            appendThought(data.type || 'thought', data.content);
          } else if (e.type === 'tool') {
            appendThought('action', `Tool [${data.name}]: ${data.status} (${data.latency}ms)`);
          } else if (e.type === 'rag') {
            appendThought('rag', `Graph-RAG: ${data.nodes?.length || 0} nós recuperados`);
          }
          
          // Simula o tempo real do agente "pensando"
          await new Promise(r => setTimeout(r, 400));
        }
        appendThought('obs', '[SYSTEM] Replay Cognitivo Finalizado.');
      } catch (err) {
        alert("Erro no Replay: " + err.message);
      }
    }

    function appendMessage(role, text, meta = '') {
      const el = document.createElement('div');
      el.classList.add('chat-bubble');
      el.classList.add(role === 'user' ? 'bubble-user' : 'bubble-bot');
      
      if (meta && role === 'bot') {
        const metaEl = document.createElement('span');
        metaEl.className = 'bubble-meta';
        metaEl.innerText = meta;
        el.appendChild(metaEl);
      }

      // --- UX Limitador de Textos Longos ---
      const MAX_LEN = 600;
      if (role === 'bot' && text.length > MAX_LEN) {
        const textContainer = document.createElement('span');
        textContainer.innerText = text.slice(0, MAX_LEN) + '...';
        el.appendChild(textContainer);

        const expandBtn = document.createElement('button');
        expandBtn.innerText = '▼ Expandir resposta completa';
        expandBtn.style.cssText = 'background: transparent; border: 1px solid var(--border-color); color: var(--accent); cursor: pointer; font-size: var(--font-xs); font-weight: 600; padding: 6px 12px; border-radius: 16px; display: block; margin-top: 10px; width: fit-content; transition: all 0.2s; font-family: inherit;';
        expandBtn.onmouseover = () => expandBtn.style.background = 'var(--bg-input)';
        expandBtn.onmouseout = () => expandBtn.style.background = 'transparent';
        
        expandBtn.onclick = () => {
          textContainer.innerText = text;
          expandBtn.style.display = 'none';
        };
        el.appendChild(expandBtn);
      } else {
        const textNode = document.createTextNode(text);
        el.appendChild(textNode);
      }

      chatMsgs.appendChild(el);
      chatMsgs.scrollTop = chatMsgs.scrollHeight;
    }

    function appendThought(type, text) {
      const el = document.createElement('div');
      el.classList.add('thought-item');
      el.classList.add(`t-${type}`);
      el.innerText = `[${type.toUpperCase()}] ${text}`;
      thoughtLog.appendChild(el);
      thoughtLog.scrollTop = thoughtLog.scrollHeight;
    }

    function updateDebugLog(jsonObj) {
      const current = debugLog.innerText;
      const newEntry = JSON.stringify(jsonObj, null, 2);
      debugLog.innerText = `--- NEW REQUEST ---\n${newEntry}\n\n${current}`.substring(0, 5000); // Limita tamanho
    }

    appendMessage('bot', 'Aguardando comandos...', '[AGENT: system_core] [CONF: 1.0]');

    chatInput.addEventListener('keypress', async (e) => {
      if (e.key === 'Enter' && chatInput.value.trim() && !chatInput.disabled) {
        const text = chatInput.value.trim();
        chatInput.value = '';
        chatInput.disabled = true;
        appendMessage('user', text);
        typingIndicator.style.display = 'block';
        chatMsgs.scrollTop = chatMsgs.scrollHeight;
        

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
          });
          const data = await res.json();
          
          typingIndicator.style.display = 'none';
            if (data.answer) {
            appendMessage('bot', data.answer, '[AGENT: core] [SCORE: 0.92]');
              loadGraph();
          } else if (data.error) {
            appendMessage('bot', 'Erro: ' + data.error);
            }
        } catch (err) {
          typingIndicator.style.display = 'none';
          appendMessage('bot', 'Erro de rede ao falar com IalClaw.');
        } finally {
          chatInput.disabled = false;
          chatInput.focus();
        }
      }
    });

    // Variáveis globais para o Grafo utilizando DataSet
    const nodesData = new vis.DataSet([]);
    const edgesData = new vis.DataSet([]);
    let network = null;

    function getGraphOptions() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const textColor = isDark ? '#e8eaed' : '#202124';
      const nodeBg = isDark ? '#8ab4f8' : '#1a73e8';
      const nodeBorder = isDark ? '#3c4043' : '#dadce0';
      const edgeColor = isDark ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.15)';
      const edgeHighlight = isDark ? '#8ab4f8' : '#1a73e8';

      return {
        nodes: {
          shape: 'dot',
          size: 20,
          font: { color: textColor, face: 'Google Sans, Segoe UI, sans-serif', size: 14 },
          borderWidth: 2,
          color: { 
            border: nodeBorder, 
            background: nodeBg, 
            highlight: { border: textColor, background: '#ea4335' } 
          },
          shadow: { enabled: true, color: 'rgba(0,0,0,0.15)', size: 5, x: 0, y: 2 }
        },
        edges: {
          width: 1.5,
          color: { color: edgeColor, highlight: edgeHighlight },
          font: { color: textColor, align: 'middle', size: 11, face: 'Google Sans, Segoe UI, sans-serif' },
          arrows: { to: { enabled: true, scaleFactor: 0.5 } },
          smooth: { type: 'continuous' }
        },
        physics: {
          barnesHut: { gravitationalConstant: -3000, centralGravity: 0.1, springLength: 200 },
          stabilization: { iterations: 150 }
        },
        interaction: { hover: true, tooltipDelay: 200 }
      };
    }

    function initGraph() {
      const container = document.getElementById('mynetwork');
      const data = { nodes: nodesData, edges: edgesData };
      const options = getGraphOptions();
      network = new vis.Network(container, data, options);
    }

    function loadGraph() {
      fetch('/api/graph')
        .then(res => res.json())
        .then(data => {
          if (!data || !data.nodes) return;

          // Atualiza contadores no header
          document.getElementById('stat-nodes').innerText = data.nodes.length;
          document.getElementById('stat-edges').innerText = (data.edges || []).length;

          // Mapeia 'name' do banco de dados para o 'label' que o Vis.js exige
          const processNodes = data.nodes.map(n => ({
            ...n,
            label: n.label || n.name
          }));

          // Mapeia 'source/target/relation' do banco para 'from/to/label' do Vis.js
          const processEdges = (data.edges || []).map(e => ({
            ...e,
            from: e.from || e.source,
            to: e.to || e.target,
            label: e.label || e.relation,
            id: e.id || `${e.source || e.from}-${e.target || e.to}-${e.relation || e.label}`
          }));

          nodesData.update(processNodes);
          edgesData.update(processEdges);
        })
        .catch(console.error);
    }
    
    // Inicializar e carregar primeiro estado
    initGraph();
    loadGraph();
    
    // Refresh a cada 10 segundos
    setInterval(loadGraph, 10000);

    // ==========================================
    // 📡 TELEMETRIA EM TEMPO REAL (SSE)
    // ==========================================
    const eventSource = new EventSource('/debug/stream');

    eventSource.addEventListener('gateway', (event) => {
      const data = JSON.parse(event.data);
      updateDebugLog(data);
    });

    eventSource.addEventListener('thought', (event) => {
      const data = JSON.parse(event.data);
      appendThought(data.type, data.content);
    });

    eventSource.addEventListener('tool', (event) => {
      const data = JSON.parse(event.data);
      appendThought('action', `Tool [${data.name}]: ${data.status} (${data.latency}ms)`);
    });

    eventSource.addEventListener('rag', (event) => {
      const data = JSON.parse(event.data);
      appendThought('rag', `Graph-RAG: ${data.nodes.length} nós recuperados (Top Score: ${data.nodes[0]?.score || 0})`);
    });
  </script>
</body>

</html>
