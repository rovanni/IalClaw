<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>IalClaw v3.0 - Memória Cognitiva</title>
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    :root {
      --font-xs: 0.75rem;   /* 12px */
      --font-sm: 0.875rem;  /* 14px */
      --font-md: 1rem;      /* 16px */
      --font-lg: 1.125rem;  /* 18px */
      --font-xl: 1.25rem;   /* 20px */
    }

    html { font-size: 16px; transition: font-size 0.2s ease-out; }

    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Top Status Bar */
    #status-bar {
      height: 35px;
      background: #0a0a0c;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: var(--font-sm);
      font-family: monospace;
      color: #888;
      gap: 20px;
    }
    .stat-badge { color: #00ccff; font-weight: bold; }
    .stat-ok { color: #00ff66; }
    .stat-warn { color: #ffcc00; }

    /* Zoom Controls */
    .zoom-btn {
      background: #1a1a20;
      border: 1px solid #333;
      color: #aaa;
      border-radius: 4px;
      cursor: pointer;
      padding: 2px 8px;
      font-size: var(--font-xs);
      transition: all 0.2s;
    }
    .zoom-btn:hover { background: #333; color: #fff; }

    /* Main Workspace */
    #workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Left Column: Graph + Debug */
    #left-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      background-image: radial-gradient(#2a2a2a 1px, transparent 1px);
      background-size: 20px 20px;
    }

    #mynetwork {
      flex: 1;
      width: 100%;
    }

    /* System Debug / Gateway Panel */
    #debug-panel {
      height: 200px;
      background: rgba(5, 5, 8, 0.95);
      border-top: 1px solid #333;
      display: flex;
      flex-direction: column;
    }
    .panel-header {
      background: #111;
      padding: 6px 15px;
      font-size: var(--font-xs);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: bold;
      color: #aaa;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
    }
    #debug-log {
      flex: 1;
      padding: 10px 15px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', Consolas, 'Courier New', monospace;
      font-size: var(--font-sm);
      color: #a3be8c; /* Hacker green/pastel */
      line-height: 1.5;
      margin: 0;
      white-space: pre-wrap;
    }

    /* Right Column: Agent Panel */
    #right-col {
      width: 400px;
      background: rgba(20, 20, 25, 0.98);
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
      box-shadow: -5px 0 20px rgba(0,0,0,0.5);
      z-index: 10;
    }

    /* Thought Trace Panel */
    #thought-panel {
      height: 40%;
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid #333;
    }
    #thought-log {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      font-family: 'JetBrains Mono', Consolas, monospace;
      font-size: var(--font-sm);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .thought-item { padding: 5px; border-radius: 4px; background: rgba(255,255,255,0.03); border-left: 3px solid #555; }
    .t-thought { border-color: #b48ead; color: #b48ead; }
    .t-action { border-color: #ebcb8b; color: #ebcb8b; }
    .t-obs { border-color: #a3be8c; color: #a3be8c; }
    .t-final { border-color: #81a1c1; color: #81a1c1; font-weight: bold; }
    .t-rag { border-color: #d08770; color: #d08770; }

    /* Chat Container */
    #chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .chat-bubble {
      padding: 12px 16px;
      border-radius: 8px;
      max-width: 85%;
      line-height: 1.5;
      word-break: break-word;
      font-size: var(--font-md);
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bubble-meta {
      font-size: var(--font-xs);
      opacity: 0.7;
      margin-bottom: 4px;
      font-family: monospace;
      display: block;
    }

    .bubble-user {
      background: linear-gradient(135deg, #00ccff, #0088ff);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 0;
      box-shadow: 0 4px 10px rgba(0, 136, 255, 0.3);
    }

    .bubble-bot {
      background: #2a2a30;
      color: #e0e0e0;
      align-self: flex-start;
      border-bottom-left-radius: 0;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    #typing-indicator {
      display: none;
      font-size: var(--font-sm);
      color: #888;
      padding: 0 15px 8px 15px;
      font-style: italic;
    }
  </style>
</head>

<body>
  <!-- Top Status Bar -->
  <header id="status-bar">
    <div>IalClaw V3.0 <span class="stat-badge">COGNITIVE DASHBOARD</span></div>
    <div>|</div>
    <div>Gateway: <span class="stat-ok">ONLINE</span></div>
    <div>Engine: <span class="stat-warn">STANDBY</span></div>
    
    <div style="margin-left: auto; display: flex; gap: 8px; align-items: center;">
      <span style="color: #666; font-size: var(--font-xs);">ZOOM</span>
      <button class="zoom-btn" onclick="changeZoom(-0.1)">-</button>
      <span id="zoom-level" style="color: #aaa; width: 45px; text-align: center; font-size: var(--font-xs);">100%</span>
      <button class="zoom-btn" onclick="changeZoom(0.1)">+</button>
    </div>
    <div>|</div>
    <div>Nodes: <span id="stat-nodes" class="stat-badge">0</span></div>
    <div>Edges: <span id="stat-edges" class="stat-badge">0</span></div>
  </header>

  <div id="workspace">
    <!-- Left: Graph & Debug -->
    <div id="left-col">
      <div id="mynetwork"></div>
      <div id="debug-panel">
        <div class="panel-header"><span>⚙️ Gateway & Policy Debug</span> <span>[LIVE]</span></div>
        <pre id="debug-log">// Aguardando interceptação de rotas e decisões do Gateway...</pre>
      </div>
    </div>

    <!-- Right: Agent Panel -->
    <div id="right-col">
      <div id="thought-panel">
        <div class="panel-header">
          <span>🧠 Thought Trace (ReAct)</span>
          <button class="zoom-btn" onclick="promptReplay()" style="background: #5e81ac; color: #fff; font-weight: bold; padding: 2px 10px;">▶ REPLAY</button>
        </div>
        <div id="thought-log">
          <div class="thought-item t-obs">[SYSTEM] AgentLoop Listening...</div>
        </div>
      </div>

      <div id="chat-container">
        <div class="panel-header"><span>💬 Interaction Panel</span></div>
        <div id="chat-messages"></div>
        <div id="typing-indicator">Agent is thinking...</div>
        <div style="padding: 15px; border-top: 1px solid #222; background: #111;">
          <input type="text" id="chat-input" placeholder="Comando cognitivo..." style="width: 100%; box-sizing: border-box; padding: 14px; background: #000; border: 1px solid #333; color: white; border-radius: 4px; outline: none; font-size: var(--font-md); font-family: inherit;">
        </div>
      </div>
    </div>
  </div>

  <script type="text/javascript">
    const chatInput = document.getElementById('chat-input');
    const chatMsgs = document.getElementById('chat-messages');
    const typingIndicator = document.getElementById('typing-indicator');
    const thoughtLog = document.getElementById('thought-log');
    const debugLog = document.getElementById('debug-log');

    // --- Controle de Zoom Persistente ---
    let currentZoom = parseFloat(localStorage.getItem('ialclaw_zoom')) || 1.0;
    
    function applyZoom() {
      // Alterar a base no HTML escala todos os tamanhos (rem) automaticamente
      document.documentElement.style.fontSize = `${16 * currentZoom}px`;
      document.getElementById('zoom-level').innerText = `${Math.round(currentZoom * 100)}%`;
      localStorage.setItem('ialclaw_zoom', currentZoom);
    }

    function changeZoom(delta) {
      currentZoom = Math.max(0.5, Math.min(2.0, currentZoom + delta));
      applyZoom();
    }
    
    applyZoom(); // Inicializa na primeira carga

    // --- Replay Cognitivo ---
    async function promptReplay() {
      const traceId = prompt("Cole o ID do Trace (trace_id) para reproduzir o raciocínio:");
      if (!traceId) return;
      
      try {
        thoughtLog.innerHTML = '';
        debugLog.innerText = `// Carregando replay para o trace: ${traceId}...\n`;
        chatMsgs.innerHTML = '';

        const res = await fetch(`/api/trace/${traceId}`);
        if (!res.ok) throw new Error("Trace não encontrado no banco de dados.");
        const events = await res.json();

        for (const e of events) {
          const data = JSON.parse(e.payload);
          
          if (e.type === 'gateway') {
            updateDebugLog(data);
          } else if (e.type === 'thought') {
            appendThought(data.type || 'thought', data.content);
          } else if (e.type === 'tool') {
            appendThought('action', `Tool [${data.name}]: ${data.status} (${data.latency}ms)`);
          } else if (e.type === 'rag') {
            appendThought('rag', `Graph-RAG: ${data.nodes?.length || 0} nós recuperados`);
          }
          
          // Simula o tempo real do agente "pensando"
          await new Promise(r => setTimeout(r, 400));
        }
        appendThought('obs', '[SYSTEM] Replay Cognitivo Finalizado.');
      } catch (err) {
        alert("Erro no Replay: " + err.message);
      }
    }

    chatInput.addEventListener('focus', () => chatInput.style.borderColor = '#00ccff');
    chatInput.addEventListener('blur', () => chatInput.style.borderColor = '#333');

    function appendMessage(role, text, meta = '') {
      const el = document.createElement('div');
      el.classList.add('chat-bubble');
      el.classList.add(role === 'user' ? 'bubble-user' : 'bubble-bot');
      
      if (meta && role === 'bot') {
        const metaEl = document.createElement('span');
        metaEl.className = 'bubble-meta';
        metaEl.innerText = meta;
        el.appendChild(metaEl);
      }

      const textNode = document.createTextNode(text);
      el.appendChild(textNode);

      chatMsgs.appendChild(el);
      chatMsgs.scrollTop = chatMsgs.scrollHeight;
    }

    function appendThought(type, text) {
      const el = document.createElement('div');
      el.classList.add('thought-item');
      el.classList.add(`t-${type}`);
      el.innerText = `[${type.toUpperCase()}] ${text}`;
      thoughtLog.appendChild(el);
      thoughtLog.scrollTop = thoughtLog.scrollHeight;
    }

    function updateDebugLog(jsonObj) {
      const current = debugLog.innerText;
      const newEntry = JSON.stringify(jsonObj, null, 2);
      debugLog.innerText = `--- NEW REQUEST ---\n${newEntry}\n\n${current}`.substring(0, 5000); // Limita tamanho
    }

    appendMessage('bot', 'Aguardando comandos...', '[AGENT: system_core] [CONF: 1.0]');

    chatInput.addEventListener('keypress', async (e) => {
      if (e.key === 'Enter' && chatInput.value.trim() && !chatInput.disabled) {
        const text = chatInput.value.trim();
        chatInput.value = '';
        chatInput.disabled = true;
        appendMessage('user', text);
        typingIndicator.style.display = 'block';
        chatMsgs.scrollTop = chatMsgs.scrollHeight;
        

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
          });
          const data = await res.json();
          
          typingIndicator.style.display = 'none';
            if (data.answer) {
            appendMessage('bot', data.answer, '[AGENT: core] [SCORE: 0.92]');
              loadGraph();
          } else if (data.error) {
            appendMessage('bot', 'Erro: ' + data.error);
            }
        } catch (err) {
          typingIndicator.style.display = 'none';
          appendMessage('bot', 'Erro de rede ao falar com IalClaw.');
        } finally {
          chatInput.disabled = false;
          chatInput.focus();
        }
      }
    });

    // Variáveis globais para o Grafo utilizando DataSet
    const nodesData = new vis.DataSet([]);
    const edgesData = new vis.DataSet([]);
    let network = null;

    function initGraph() {
      const container = document.getElementById('mynetwork');
      const data = { nodes: nodesData, edges: edgesData };
      const options = {
        nodes: {
          shape: 'dot',
          size: 20,
          font: { color: '#ffffff', face: 'Segoe UI', size: 14 },
          borderWidth: 2,
          color: { 
            border: '#333', 
            background: '#00ccff', 
            highlight: { border: '#fff', background: '#ff0099' } 
          },
          shadow: { enabled: true, color: 'rgba(0,204,255,0.4)', size: 10, x: 0, y: 0 }
        },
        edges: {
          width: 1.5,
          color: { color: 'rgba(255,255,255,0.2)', highlight: '#00ccff' },
          font: { color: '#aaaaaa', align: 'middle', size: 11, face: 'Segoe UI' },
          arrows: { to: { enabled: true, scaleFactor: 0.5 } },
          smooth: { type: 'continuous' }
        },
        physics: {
          barnesHut: { gravitationalConstant: -3000, centralGravity: 0.1, springLength: 200 },
          stabilization: { iterations: 150 }
        },
        interaction: { hover: true, tooltipDelay: 200 }
      };
      network = new vis.Network(container, data, options);
    }

    function loadGraph() {
      fetch('/api/graph')
        .then(res => res.json())
        .then(data => {
          if (!data || !data.nodes) return;

          // Atualiza contadores no header
          document.getElementById('stat-nodes').innerText = data.nodes.length;
          document.getElementById('stat-edges').innerText = (data.edges || []).length;

          // Mapeia 'name' do banco de dados para o 'label' que o Vis.js exige
          const processNodes = data.nodes.map(n => ({
            ...n,
            label: n.label || n.name
          }));

          // Mapeia 'source/target/relation' do banco para 'from/to/label' do Vis.js
          const processEdges = (data.edges || []).map(e => ({
            ...e,
            from: e.from || e.source,
            to: e.to || e.target,
            label: e.label || e.relation,
            id: e.id || `${e.source || e.from}-${e.target || e.to}-${e.relation || e.label}`
          }));

          nodesData.update(processNodes);
          edgesData.update(processEdges);
        })
        .catch(console.error);
    }
    
    // Inicializar e carregar primeiro estado
    initGraph();
    loadGraph();
    
    // Refresh a cada 10 segundos
    setInterval(loadGraph, 10000);

    // ==========================================
    // 📡 TELEMETRIA EM TEMPO REAL (SSE)
    // ==========================================
    const eventSource = new EventSource('/debug/stream');

    eventSource.addEventListener('gateway', (event) => {
      const data = JSON.parse(event.data);
      updateDebugLog(data);
    });

    eventSource.addEventListener('thought', (event) => {
      const data = JSON.parse(event.data);
      appendThought(data.type, data.content);
    });

    eventSource.addEventListener('tool', (event) => {
      const data = JSON.parse(event.data);
      appendThought('action', `Tool [${data.name}]: ${data.status} (${data.latency}ms)`);
    });

    eventSource.addEventListener('rag', (event) => {
      const data = JSON.parse(event.data);
      appendThought('rag', `Graph-RAG: ${data.nodes.length} nós recuperados (Top Score: ${data.nodes[0]?.score || 0})`);
    });
  </script>
</body>

</html>
