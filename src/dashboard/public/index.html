<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>IalClaw v3.0 - Memória Cognitiva</title>
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    body {
      background-color: #1e1e1e;
      color: white;
      font-family: sans-serif;
      margin: 0;
      overflow: hidden;
    }

    h1 {
      padding: 20px;
      margin: 0;
      text-align: center;
      border-bottom: 1px solid #333;
      font-weight: 300;
      letter-spacing: 2px;
    }

    #mynetwork {
      width: 100vw;
      height: calc(100vh - 80px);
    }
  </style>
</head>

<body>
  <h1>IalClaw Grafo Cognitivo (Tempo Real)</h1>
  <div id="mynetwork"></div>
  <div id="chat-container"
    style="position: absolute; right: 20px; bottom: 20px; width: 350px; height: 500px; background: rgba(30,30,30,0.9); border: 1px solid #444; border-radius: 10px; display: flex; flex-direction: column; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
    <div style="padding: 15px; border-bottom: 1px solid #444; font-weight: bold; text-align: center; color: #00ccff;">
      IalClaw Web Chat</div>
    <div id="chat-messages"
      style="flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px;"></div>
    <div style="padding: 10px; border-top: 1px solid #444; display: flex;">
      <input type="text" id="chat-input" placeholder="Digite sua mensagem e aperte Enter..."
        style="flex: 1; padding: 10px; background: #2a2a2a; border: 1px solid #555; color: white; border-radius: 6px; outline: none;">
    </div>
  </div>

  <script type="text/javascript">
    const chatInput = document.getElementById('chat-input');
    const chatMsgs = document.getElementById('chat-messages');

    function appendMessage(role, text) {
      const el = document.createElement('div');
      el.style.padding = '10px 14px';
      el.style.borderRadius = '8px';
      el.style.maxWidth = '85%';
      el.style.lineHeight = '1.4';
      el.style.wordBreak = 'break-word';

      if (role === 'user') {
        el.style.background = '#00ccff';
        el.style.color = '#000';
        el.style.alignSelf = 'flex-end';
        el.style.borderBottomRightRadius = '0px';
      } else {
        el.style.background = '#444';
        el.style.color = '#fff';
        el.style.alignSelf = 'flex-start';
        el.style.borderBottomLeftRadius = '0px';
      }
      el.innerText = text;
      chatMsgs.appendChild(el);
      chatMsgs.scrollTop = chatMsgs.scrollHeight;
    }

    appendMessage('bot', 'Olá! Como posso ajudar você hoje? As suas mensagens vão gerar nós de memória no gráfico vizinho!');

    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && chatInput.value.trim()) {
        const text = chatInput.value.trim();
        chatInput.value = '';
        appendMessage('user', text);

        fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        })
          .then(res => res.json())
          .then(data => {
            if (data.answer) {
              appendMessage('bot', data.answer);
              // Atualiza o gráfico imediatamente após receber resposta
              loadGraph();
            }
            else if (data.error) appendMessage('bot', 'Erro: ' + data.error);
          })
          .catch(err => appendMessage('bot', 'Erro de rede ao falar com IalClaw.'));
      }
    });

    function loadGraph() {
      fetch('/api/graph')
        .then(res => res.json())
        .then(data => {
          var container = document.getElementById('mynetwork');
          var graphData = { nodes: data.nodes, edges: data.edges };
          var options = {
            nodes: {
              shape: 'dot',
              size: 20,
              font: { color: '#ffffff', face: 'monospace' },
              borderWidth: 2,
              color: { border: '#444', background: '#00ccff', highlight: { background: '#ff0099' } }
            },
            edges: {
              width: 1.5,
              color: { color: '#555', highlight: '#00ccff' },
              font: { color: '#aaaaaa', align: 'middle', size: 10 },
              arrows: { to: { enabled: true, scaleFactor: 0.5 } }
            },
            physics: {
              barnesHut: { gravitationalConstant: -2000, centralGravity: 0.1, springLength: 150 },
              stabilization: { iterations: 150 }
            }
          };
          new vis.Network(container, graphData, options);
        })
        .catch(console.error);
    }
    loadGraph();
    // Refresh a cada 10 segundos
    setInterval(loadGraph, 10000);
  </script>
</body>

</html>
